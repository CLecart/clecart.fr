server {
    listen       80;
    server_name  localhost;
    root   /usr/share/nginx/html;
    index  index.html;

    include /etc/nginx/security-headers.conf;

    gzip on;
    gzip_comp_level 5;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|css|js)$ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Vary "Accept-Encoding, Accept";
        access_log off;

        # Serve a .webp sibling when the client advertises support for it.
        set $webp_suffix "";
        if ($http_accept ~* "webp") {
            set $webp_suffix ".webp";
        }

        location ~* \.(jpe?g|png)$ {
            include /etc/nginx/security-headers.conf;
            try_files $uri$webp_suffix $uri =404;
        }
    }

    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        include /etc/nginx/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(mp4|webm)$ {
        include /etc/nginx/security-headers.conf;
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location = /cv {
        include /etc/nginx/security-headers.conf;
        alias /usr/share/nginx/html/assets/documents/CV_Christophe_Lecart.pdf;
        add_header Content-Type "application/pdf";
        add_header Content-Disposition 'attachment; filename="CV_Christophe_Lecart.pdf"';
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        include /etc/nginx/security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }
}
